name: dbt - Deploy Prod

on:
  push:
    branches:
      - main

jobs:
  seed:
    name: Seed
    if: contains(github.event.head_commit.modified, 'seeds/') || contains(github.event.head_commit.added, 'seeds/')
    runs-on: ubuntu-latest

    env:
      JAFFLE_SHOP_DB_PATH: ${{ secrets.JAFFLE_SHOP_DB_PATH }}
      MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}

    steps:
      - uses: "actions/checkout@v4"
      - uses: "actions/setup-python@v5"
        with:
          python-version: "3.12"
      - name: Install uv
        run: python3 -m pip install uv
      - name: Install dbt
        run: uv pip install dbt-core dbt-duckdb duckdb==1.4.4 --system
      - name: Install dbt packages
        run: dbt deps
      - name: Seed source data
        run: dbt seed --vars '{load_source_data: true}'

  deploy:
    name: Run
    needs: [seed]
    if: always() && !failure()
    runs-on: ubuntu-latest

    env:
      JAFFLE_SHOP_DB_PATH: ${{ secrets.JAFFLE_SHOP_DB_PATH }}
      MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}

    steps:
      - uses: "actions/checkout@v4"
      - uses: "actions/setup-python@v5"
        with:
          python-version: "3.12"
      - name: Install uv
        run: python3 -m pip install uv
      - name: Install dbt
        run: uv pip install dbt-core dbt-duckdb duckdb==1.4.4 --system
      - name: Install dbt packages
        run: dbt deps
      - name: Run dbt models
        run: dbt run --target prod
      - name: Generate docs
        run: dbt docs generate --target prod
      - name: Upload dbt artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dbt-target
          path: target/
