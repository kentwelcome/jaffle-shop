name: Deploy Pipeline Dashboard to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'pipeline-dashboard/**'
      - '.github/workflows/deploy-dashboard.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dbt and build project
        run: |
          pip install dbt-duckdb
          dbt deps
          dbt build --target prod
          dbt docs generate --target prod

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pipeline-dashboard/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: pipeline-dashboard
        run: pnpm install

      - name: Extract sources from DuckDB
        working-directory: pipeline-dashboard
        run: pnpm exec evidence sources

      - name: Build static site
        working-directory: pipeline-dashboard
        run: pnpm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pipeline-dashboard/.evidence/template/build

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
